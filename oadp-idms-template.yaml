---
# ImageDigestMirrorSet for OADP pre-GA builds
# Redirects registry.redhat.io images to art-images-share
#
# Generated from: quay.io/redhat-user-workloads/ocp-art-tenant/art-fbc:oadp-1.6__v4.22__oadp-rhel9-operator
# To regenerate with latest FBC: make oadp-discover-images OADP_FBC_IMAGE=<fbc-image>
#
# NOTE: The name field is replaced dynamically during deployment with a hash of the FBC image
# to ensure each FBC version gets its own IDMS (e.g., oadp-images-mirror-f68e0077)
apiVersion: config.openshift.io/v1
kind: ImageDigestMirrorSet
metadata:
  name: oadp-images-mirror-set
spec:
  imageDigestMirrors:
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-mustgather-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-non-admin-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-operator-bundle
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-rhel9-operator
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-plugin-for-aws-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-plugin-for-gcp-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-plugin-for-legacy-aws-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-plugin-for-microsoft-azure-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-plugin-rhel9
  - mirrors:
    - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
    source: registry.redhat.io/oadp/oadp-velero-rhel9
